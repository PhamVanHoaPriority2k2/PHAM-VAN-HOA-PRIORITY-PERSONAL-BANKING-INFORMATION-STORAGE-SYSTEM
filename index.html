<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHẠM VĂN HOÀ PRIORITY - PERSONAL BANKING</title>
    <style>
        :root {
            --bg-body: #f2f2f7;
            --bg-card: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #000000;
            --text-sub: #3a3a3c;
            --primary: #00BC3C;
            --danger: #ff3b30;
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            --input-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg-body: #1a1a1a;
            --bg-card: rgba(40, 40, 40, 0.95);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-sub: #ebebf5;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --input-bg: #333333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-weight: 700; }
        body { background: var(--bg-body); color: var(--text-main); transition: 0.4s; padding: 20px; min-height: 100vh; }

        /* --- AUTH STYLES --- */
        .auth-container { max-width: 400px; margin: 60px auto; background: var(--bg-card); padding: 35px; border-radius: 30px; border: 1px solid var(--glass-border); box-shadow: var(--shadow); text-align: center; animation: fadeIn 0.5s ease; }
        .auth-container h2 { margin-bottom: 20px; text-transform: uppercase; font-size: 1.2rem; color: var(--primary); }
        .field { text-align: left; margin-bottom: 15px; }
        .field label { font-size: 0.75rem; margin-left: 5px; color: var(--text-sub); }
        .auth-input { width: 100%; padding: 14px; margin-top: 5px; border-radius: 15px; border: 1px solid var(--glass-border); background: var(--input-bg); color: var(--text-main); outline: none; font-size: 1rem; }
        .btn-auth { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 15px; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .link-auth { display: block; margin-top: 15px; font-size: 0.8rem; color: #007aff; cursor: pointer; text-decoration: underline; }

        /* --- APP STYLES --- */
        .header { max-width: 1200px; margin: 0 auto 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .brand-container { display: flex; align-items: center; gap: 12px; }
        .nca-logo-top { width: 45px; height: auto; border-radius: 8px; }
        .brand-title { font-size: 12px; text-transform: uppercase; max-width: 250px; line-height: 1.3; }
        
        .controls { display: flex; align-items: center; gap: 10px; }
        .theme-btn { background: var(--bg-card); border: 1px solid var(--glass-border); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-main); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--bg-card); border-radius: 24px; padding: 20px; border: 1px solid var(--glass-border); box-shadow: var(--shadow); position: relative; animation: fadeIn 0.3s ease; }
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
        .label { font-size: 10px; color: var(--text-sub); text-transform: uppercase; }
        .value { font-size: 16px; margin-bottom: 12px; }
        .val-stk { color: var(--primary); font-family: monospace; font-size: 18px; display: flex; justify-content: space-between; align-items: center; }
        
        .btn-copy { background: rgba(0, 188, 60, 0.1); color: var(--primary); border: 1.5px solid var(--primary); padding: 4px 10px; border-radius: 8px; font-size: 10px; cursor: pointer; }
        .btn-delete { width: 100%; background: none; border: 1px solid var(--danger); color: var(--danger); padding: 8px; border-radius: 12px; cursor: pointer; margin-top: 10px; font-size: 12px; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); z-index: 999; justify-content: center; align-items: center; }
        .modal { background: var(--bg-card); padding: 25px; border-radius: 25px; width: 90%; max-width: 380px; border: 1px solid var(--glass-border); }
        .modal input, .modal select, .modal textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid var(--glass-border); background: var(--input-bg); color: var(--text-main); outline: none; }

        .footer { margin-top: 50px; text-align: center; padding: 30px; }
        .tinnhiem-img { width: 120px; margin-bottom: 10px; }
        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="loginScreen" class="auth-container">
        <h2>Đăng Nhập</h2>
        <div class="field"><label>Số CCCD</label><input type="text" id="loginCCCD" class="auth-input" placeholder="12 số CCCD"></div>
        <div class="field"><label>Mật khẩu</label><input type="password" id="loginPass" class="auth-input" placeholder="******"></div>
        <button class="btn-auth" onclick="handleLogin()">ĐĂNG NHẬP</button>
        <span class="link-auth" onclick="showScreen('registerScreen')">Chưa có tài khoản? Đăng ký ngay</span>
        <span class="link-auth" onclick="showScreen('forgotScreen')">Quên mật khẩu?</span>
    </div>

    <div id="registerScreen" class="auth-container hidden">
        <h2>Đăng Ký Hệ Thống</h2>
        <div class="field"><label>Họ và Tên</label><input type="text" id="regName" class="auth-input" placeholder="NGUYỄN VĂN A"></div>
        <div class="field"><label>Số CCCD</label><input type="text" id="regCCCD" class="auth-input" placeholder="Dùng làm tài khoản"></div>
        <div class="field"><label>Mã ID Nhân Viên</label><input type="text" id="regID" class="auth-input" placeholder="Dùng để lấy lại mật khẩu"></div>
        <div class="field"><label>Mật khẩu</label><input type="password" id="regPass" class="auth-input" placeholder="******"></div>
        <button class="btn-auth" onclick="handleRegister()">TẠO TÀI KHOẢN</button>
        <span class="link-auth" onclick="showScreen('loginScreen')">Quay lại Đăng nhập</span>
    </div>

    <div id="forgotScreen" class="auth-container hidden">
        <h2>Lấy Lại Mật Khẩu</h2>
        <div class="field"><label>Số CCCD</label><input type="text" id="forgotCCCD" class="auth-input"></div>
        <div class="field"><label>Mã ID Nhân Viên</label><input type="text" id="forgotID" class="auth-input"></div>
        <div class="field"><label>Mật khẩu mới</label><input type="password" id="forgotNewPass" class="auth-input"></div>
        <button class="btn-auth" style="background:var(--danger)" onclick="handleReset()">CẬP NHẬT MẬT KHẨU</button>
        <span class="link-auth" onclick="showScreen('loginScreen')">Quay lại</span>
    </div>

    <div id="mainApp" class="hidden">
        <div class="header">
            <div class="brand-container">
                <img src="https://tinnhiemmang.vn/storage/photos/shares/uploads/0-02-06-d97700c1b2311ce041221f7614d18c5fd20796a5b65aa49d9c2e4ff107da71158ecef193bfa06da1342.png" alt="NCA Logo" class="nca-logo-top">
                <div class="brand-title" id="topBrand"></div>
            </div>
            <div class="controls">
                <span id="userHello" style="font-size: 10px; color: var(--primary);"></span>
                <select id="langSelect" onchange="updateUI(this.value)" style="padding: 5px; border-radius: 8px;">
                    <option value="vn">VN</option>
                    <option value="gb">EN</option>
                </select>
                <button class="theme-btn" onclick="toggleTheme()">🌙</button>
                <button onclick="openModal()" id="btnNew" style="background:var(--primary); color:white; border:none; padding:10px 15px; border-radius:12px; cursor:pointer;">+ MỚI</button>
                <button onclick="logout()" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:10px; text-decoration:underline;">Thoát</button>
            </div>
        </div>

        <div class="grid" id="cardContainer"></div>

        <div class="modal-overlay" id="modal">
            <div class="modal">
                <h2 id="modalTitle" style="text-align:center; font-size: 1.1rem; margin-bottom: 15px;"></h2>
                <label id="lblBank"></label><select id="inBank"></select>
                <label id="lblAcc"></label><input type="text" id="inAcc">
                <label id="lblName"></label><input type="text" id="inName" style="text-transform:uppercase;">
                <label id="lblNote"></label><textarea id="inNote" rows="2"></textarea>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                    <button onclick="closeModal()" id="btnCancel" style="background:var(--danger); color:white; border:none; padding:12px; border-radius:10px; cursor:pointer;"></button>
                    <button onclick="saveCard()" id="btnSave" style="background:var(--primary); color:white; border:none; padding:12px; border-radius:10px; cursor:pointer;"></button>
                </div>
            </div>
        </div>

        <div class="footer">
            <a href="https://tinnhiemmang.vn" target="_blank"><img src="https://tinnhiemmang.vn/storage/photos/shares/CetificateTrust/Web_pre_nca2x.png" class="tinnhiem-img"></a>
            <div id="bottomBrand" style="font-size: 10px; color: var(--text-sub); text-transform: uppercase;"></div>
        </div>
    </div>

    <script>
        const shieldSVG = `<svg style="width:16px;height:16px;vertical-align:middle" viewBox="0 0 24 24"><path d="M12 2L4 5v6.09c0 5.05 3.41 9.76 8 10.91 4.59-1.15 8-5.86 8-10.91V5l-8-3z" fill="#00BC3C"/></svg>`;
        const tickSVG = `<svg style="width:14px;height:14px;vertical-align:middle" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" fill="#00BC3C"/></svg>`;
        const banks = ["Vietcombank", "Techcombank", "MB Bank", "VietinBank", "BIDV", "Agribank", "ACB", "TPBank", "VPBank", "Sacombank"];
        
        const i18n = {
            vn: { brand: "HỆ THỐNG LƯU TRỮ NGÂN HÀNG CÁ NHÂN PVH", add: "+ MỚI", bank: "Ngân hàng", acc: "Số tài khoản", name: "Tên chủ thẻ", note: "Ghi chú", cancel: "HỦY", save: "LƯU", copy: "Chép", del: "Xóa tài khoản", head: "Thêm thông tin", prod: "PHÁT TRIỂN BỞI PHẠM VĂN HOÀ PRIORITY" },
            gb: { brand: "PVH PERSONAL BANKING STORAGE SYSTEM", add: "+ NEW", bank: "Bank", acc: "Account No", name: "Card Holder", note: "Notes", cancel: "CANCEL", save: "SAVE", copy: "Copy", del: "Delete", head: "Add Information", prod: "DEVELOPED BY PHAM VAN HOA PRIORITY" }
        };

        let currentCCCD = "";
        let currentLang = 'vn';

        // --- HÀM CHUYỂN MÀN HÌNH ---
        function showScreen(id) {
            ['loginScreen', 'registerScreen', 'forgotScreen', 'mainApp'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // --- LOGIC TÀI KHOẢN ---
        function handleRegister() {
            const name = document.getElementById('regName').value.trim(), cccd = document.getElementById('regCCCD').value.trim(), 
                  id = document.getElementById('regID').value.trim(), pass = document.getElementById('regPass').value;
            if(!name || !cccd || !id || !pass) return alert("Vui lòng nhập đủ!");
            let users = JSON.parse(localStorage.getItem('bank_users') || "[]");
            if(users.find(u => u.cccd === cccd)) return alert("CCCD này đã tồn tại!");
            users.push({name, cccd, id, pass});
            localStorage.setItem('bank_users', JSON.stringify(users));
            alert("Đăng ký thành công!");
            showScreen('loginScreen');
        }

        function handleLogin() {
            const cccd = document.getElementById('loginCCCD').value.trim(), pass = document.getElementById('loginPass').value;
            let users = JSON.parse(localStorage.getItem('bank_users') || "[]");
            const user = users.find(u => u.cccd === cccd && u.pass === pass);
            if(user) {
                currentCCCD = cccd;
                document.getElementById('userHello').innerText = "Chào, " + user.name;
                showScreen('mainApp');
                updateUI('vn');
            } else { alert("Sai CCCD hoặc mật khẩu!"); }
        }

        function handleReset() {
            const cccd = document.getElementById('forgotCCCD').value.trim(), id = document.getElementById('forgotID').value.trim(), 
                  newPass = document.getElementById('forgotNewPass').value;
            let users = JSON.parse(localStorage.getItem('bank_users') || "[]");
            let idx = users.findIndex(u => u.cccd === cccd && u.id === id);
            if(idx !== -1) {
                users[idx].pass = newPass;
                localStorage.setItem('bank_users', JSON.stringify(users));
                alert("Đã đổi mật khẩu!");
                showScreen('loginScreen');
            } else { alert("Thông tin không khớp!"); }
        }

        function logout() { currentCCCD = ""; showScreen('loginScreen'); }

        // --- LOGIC ỨNG DỤNG ---
        function updateUI(lang) {
            currentLang = lang;
            const t = i18n[lang];
            document.getElementById('topBrand').innerHTML = `<span>${t.brand}</span> ${shieldSVG}`;
            document.getElementById('bottomBrand').innerHTML = `${tickSVG} ${t.prod}`;
            document.getElementById('btnNew').innerText = t.add;
            document.getElementById('modalTitle').innerText = t.head;
            document.getElementById('lblBank').innerText = t.bank;
            document.getElementById('lblAcc').innerText = t.acc;
            document.getElementById('lblName').innerText = t.name;
            document.getElementById('lblNote').innerText = t.note;
            document.getElementById('btnCancel').innerText = t.cancel;
            document.getElementById('btnSave').innerText = t.save;
            renderCards();
        }

        function toggleTheme() {
            const h = document.documentElement;
            h.setAttribute('data-theme', h.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
        }

        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function saveCard() {
            const b = document.getElementById('inBank').value, a = document.getElementById('inAcc').value, 
                  n = document.getElementById('inName').value.toUpperCase(), nt = document.getElementById('inNote').value;
            if(!a || !n) return;
            let data = JSON.parse(localStorage.getItem('cards_' + currentCCCD) || "[]");
            data.push({b, a, n, nt});
            localStorage.setItem('cards_' + currentCCCD, JSON.stringify(data));
            closeModal(); renderCards();
            document.getElementById('inAcc').value = ''; document.getElementById('inName').value = ''; document.getElementById('inNote').value = '';
        }

        function deleteCard(i) {
            if(!confirm("Xóa?")) return;
            let data = JSON.parse(localStorage.getItem('cards_' + currentCCCD) || "[]");
            data.splice(i, 1);
            localStorage.setItem('cards_' + currentCCCD, JSON.stringify(data));
            renderCards();
        }

        function renderCards() {
            const container = document.getElementById('cardContainer');
            container.innerHTML = "";
            let data = JSON.parse(localStorage.getItem('cards_' + currentCCCD) || "[]");
            const t = i18n[currentLang];
            data.forEach((item, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="label-row"><span class="label">${t.bank}</span>${tickSVG}</div><div class="value">${item.b}</div>
                    <div class="label-row"><span class="label">${t.acc}</span>${tickSVG}</div>
                    <div class="value val-stk"><span>${item.a}</span><button class="btn-copy" onclick="navigator.clipboard.writeText('${item.a}');alert('Done!')">${t.copy}</button></div>
                    <div class="label-row"><span class="label">${t.name}</span>${tickSVG}</div><div class="value">${item.n}</div>
                    ${item.nt ? `<div style="background:rgba(0,188,60,0.1);padding:8px;border-radius:10px;font-size:11px;margin-bottom:10px;">${item.nt}</div>` : ''}
                    <button class="btn-delete" onclick="deleteCard(${i})">${t.del}</button>
                `;
                container.appendChild(card);
            });
        }

        const s = document.getElementById('inBank');
        banks.forEach(b => s.innerHTML += `<option value="${b}">${b}</option>`);
    </script>
</body>
</html>
